<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking Gamebit</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f6fa;
      margin: 0;
      padding: 16px;
      color: #1f2937;
    }

    .page-top {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 10px;
    }

    .update-time {
      font-size: 15px;
      color: #374151;
      font-weight: 600;
    }

    .ranking-container {
      width: 100%;
      overflow-x: auto;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
      border: 1px solid #ececf3;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 980px;
    }

    thead th {
      background: #ececf5;
      font-weight: 700;
      font-size: 14px;
      color: #374151;
      position: sticky;
      top: 0;
      z-index: 3;
    }

    th, td {
      padding: 14px 10px;
      text-align: center;
      border-bottom: 1px solid #eef0f4;
      white-space: nowrap;
      font-size: 14px;
    }

    tbody tr:hover td {
      background: #f8fafc;
      transition: 0.2s ease;
    }

    .sticky-col {
      position: sticky;
      left: 0;
      z-index: 2;
      min-width: 70px;
      width: 70px;
    }

    .sticky-col-2 {
      position: sticky;
      left: 70px;
      z-index: 2;
      min-width: 280px;
      max-width: 280px;
      text-align: left;
      padding-left: 16px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    tbody td.sticky-col,
    tbody td.sticky-col-2 {
      background: #ffffff;
    }

    thead th.sticky-col,
    thead th.sticky-col-2 {
      background: #ececf5;
      z-index: 4;
    }

    tbody tr.first-place td {
      background: #fff5d0;
      font-weight: 700;
    }

    tbody tr.first-place td.sticky-col,
    tbody tr.first-place td.sticky-col-2 {
      background: #fff5d0;
    }

    .position-badge {
      font-weight: 700;
      color: #111827;
    }

    .player-name {
      font-weight: 600;
    }

    @media (max-width: 768px) {
      body {
        padding: 8px;
      }

      .page-top {
        margin-bottom: 8px;
      }

      .update-time {
        font-size: 13px;
      }

      table {
        min-width: 860px;
      }

      th, td {
        padding: 10px 8px;
        font-size: 12px;
      }

      .sticky-col {
        min-width: 56px;
        width: 56px;
        left: 0;
      }

      .sticky-col-2 {
        left: 56px;
        min-width: 180px;
        max-width: 180px;
        padding-left: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="page-top">
    <div class="update-time">⏱ Última atualização: 03/05/2026, 17:57</div>
  </div>

  <div class="ranking-container">
    <table>
      <thead>
        <tr>
          <th class="sticky-col">#</th>
          <th class="sticky-col-2">👤 Jogador</th>
          <th>🎯 PTS</th>
          <th>PJ</th>
          <th>✅ V</th>
          <th>🤝 E</th>
          <th>❌ D</th>
          <th>⚽ GP</th>
          <th>🛡️ GS</th>
          <th>🧱 SG</th>
          <th>📊 %</th>
        </tr>
      </thead>
      <tbody>
    <tr class="first-place">
      <td class="sticky-col"><span class="position-badge">1º</span></td>
      <td class="sticky-col-2"><span class="player-name"></span></td>
      <td>0</td>
      <td>0</td>
      <td>0</td>
      <td>0</td>
      <td>0</td>
      <td>0</td>
      <td>0</td>
      <td>0</td>
      <td>0%</td>
    </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
